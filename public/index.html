<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DrexMusic — Download Music & Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: #10101e;
      --card: #13132000;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #6c63ff;
      --accent2: #ff6584;
      --teal: #00d4aa;
      --text: #f0f0ff;
      --muted: #8888aa;
      --dim: #44445a;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,101,132,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
      background: rgba(8,8,16,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #6c63ff, #ff6584);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab {
      padding: 7px 18px; border-radius: 100px; font-size: 0.85rem; font-weight: 500;
      border: 1px solid transparent; background: none; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
    }
    .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-tab.active { color: var(--text); background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.3); }

    .hero {
      position: relative; z-index: 1;
      text-align: center; padding: 72px 24px 48px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.25);
      padding: 5px 16px; border-radius: 100px; font-size: 0.78rem; color: #a09cff;
      font-weight: 500; margin-bottom: 20px; letter-spacing: 0.05em;
    }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    .hero h1 {
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      font-weight: 900; letter-spacing: -0.04em; line-height: 1.05;
      margin-bottom: 16px;
    }
    .hero h1 .grad {
      background: linear-gradient(135deg, #6c63ff 0%, #ff6584 50%, #00d4aa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--muted); font-size: 1.05rem; font-weight: 300; max-width: 440px; margin: 0 auto 40px; line-height: 1.6; }

    .format-toggle {
      display: inline-flex; gap: 0; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 100px; padding: 4px;
      margin-bottom: 20px;
    }
    .fmt-btn {
      padding: 8px 24px; border-radius: 100px; border: none; background: transparent;
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.88rem;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .fmt-btn.active { background: var(--accent); color: #fff; }
    .fmt-btn:not(.active):hover { color: var(--text); }

    .search-wrap {
      max-width: 620px; margin: 0 auto;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .search-box {
      display: flex; gap: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      border-radius: 14px; padding: 6px 6px 6px 20px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: rgba(108,99,255,0.5); }
    .search-box input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'Outfit', sans-serif; font-size: 1rem; color: var(--text);
    }
    .search-box input::placeholder { color: var(--dim); }
    .search-go {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 12px 28px; font-family: 'Outfit', sans-serif; font-weight: 700;
      font-size: 0.9rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .search-go:hover { background: #5a52ee; transform: translateY(-1px); }
    .search-go:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .main { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }

    #results { margin-top: 40px; }
    .results-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 16px;
    }

    .track-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
      animation: fadeUp 0.3s ease both;
      transition: border-color 0.2s, background 0.2s;
    }
    .track-card:hover { border-color: var(--border2); background: rgba(255,255,255,0.05); }

    .track-top { display: flex; gap: 14px; padding: 16px; align-items: center; }
    .track-thumb-wrap { position: relative; flex-shrink: 0; width: 72px; height: 72px; }
    .track-thumb {
      width: 72px; height: 72px; border-radius: 10px;
      object-fit: cover; background: var(--surface); display: block;
    }
    .thumb-ph { width: 72px; height: 72px; border-radius: 10px; background: rgba(108,99,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }

    .play-overlay {
      position: absolute; inset: 0; border-radius: 10px;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s; cursor: pointer;
    }
    .track-thumb-wrap:hover .play-overlay { opacity: 1; }
    .play-icon { width: 28px; height: 28px; fill: #fff; }

    .track-info { flex: 1; min-width: 0; }
    .track-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-author { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
    .track-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .duration-pill {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 100px; font-size: 0.72rem;
      color: var(--muted); font-family: 'JetBrains Mono', monospace;
      margin-left: auto; align-self: flex-start; flex-shrink: 0;
    }

    .act-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-family: 'Outfit', sans-serif;
      font-size: 0.8rem; font-weight: 600; color: var(--muted); transition: all 0.2s;
      text-decoration: none;
    }
    .act-btn:hover { border-color: var(--border2); color: var(--text); background: rgba(255,255,255,0.05); }
    .act-btn.preview { border-color: rgba(108,99,255,0.3); color: #a09cff; }
    .act-btn.preview:hover { background: rgba(108,99,255,0.12); }
    .act-btn.preview.playing { background: rgba(108,99,255,0.15); border-color: var(--accent); color: var(--accent); }
    .act-btn.dl-audio { border-color: rgba(0,212,170,0.3); color: var(--teal); }
    .act-btn.dl-audio:hover { background: rgba(0,212,170,0.1); }
    .act-btn.dl-video { border-color: rgba(255,101,132,0.3); color: var(--accent2); }
    .act-btn.dl-video:hover { background: rgba(255,101,132,0.1); }

    .player-bar {
      margin: 0 16px 16px;
      background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.2);
      border-radius: 10px; padding: 12px 14px;
      display: none;
    }
    .player-bar.visible { display: block; animation: fadeUp 0.2s ease; }
    .player-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .player-title { font-size: 0.82rem; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #c0bcff; }
    .player-time { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
    .player-controls { display: flex; align-items: center; gap: 10px; }
    .p-btn { background: none; border: none; cursor: pointer; color: #a09cff; font-size: 1rem; padding: 4px; transition: color 0.15s; }
    .p-btn:hover { color: var(--text); }
    .progress-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; pointer-events: none; }

    .loader { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); font-size: 0.9rem; }
    .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { background: rgba(255,101,132,0.08); border: 1px solid rgba(255,101,132,0.2); border-radius: 12px; padding: 16px 20px; color: #ff8fa3; font-size: 0.9rem; }

    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    .empty-sub { font-size: 0.85rem; color: var(--dim); }

    .dl-loading { opacity: 0.6; pointer-events: none; }

    @media (max-width: 560px) {
      nav { padding: 0 16px; }
      .hero { padding: 48px 16px 32px; }
      .main { padding: 0 16px 60px; }
      .track-actions { gap: 6px; }
      .act-btn { padding: 6px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">DrexMusic</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab('search', this)">🔍 Search</button>
    <button class="nav-tab" onclick="setTab('url', this)">🔗 URL</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow"><span class="pulse"></span> YouTube Downloader</div>
  <h1>Music & Videos<br><span class="grad">Free Downloads</span></h1>
  <p>Search any song or video, preview it right here, then download as MP3 or MP4.</p>

  <div class="format-toggle">
    <button class="fmt-btn active" id="fmt-audio" onclick="setFormat('audio', this)">🎵 Audio</button>
    <button class="fmt-btn" id="fmt-video" onclick="setFormat('video', this)">🎬 Video</button>
  </div>

  <div class="search-wrap">
    <div class="search-box" id="search-box">
      <input type="text" id="search-input" placeholder="Search song, artist, or paste YouTube URL..." />
      <button class="search-go" id="search-btn" onclick="handleSearch()">Search</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="results">
    <div class="empty-state">
      <div class="empty-icon">🎶</div>
      <div class="empty-title">Search for any song or video</div>
      <div class="empty-sub">Supports YouTube & YouTube Music</div>
    </div>
  </div>
</div>

<!-- Global audio player -->
<audio id="global-audio" style="display:none"></audio>

<script>
  // Use the current host for API calls (works when served from same server)
  const API_BASE = window.location.origin;
  let currentFormat = 'audio';
  let currentTab = 'search';
  let activePreview = null;
  const audio = document.getElementById('global-audio');

  function setFormat(fmt, btn) {
    currentFormat = fmt;
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search-input').placeholder =
      fmt === 'audio' ? 'Search song, artist, or paste YouTube URL...' : 'Search video or paste YouTube URL...';
  }

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search-input').placeholder =
      tab === 'url' ? 'Paste YouTube URL here...' : 'Search song, artist, or paste YouTube URL...';
    document.getElementById('search-input').value = '';
    document.getElementById('search-input').focus();
  }

  function isUrl(str) { 
    return str.startsWith('http://') || str.startsWith('https://'); 
  }

  function formatDur(sec) {
    if (!sec) return '—';
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function formatTime(sec) {
    if (isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  async function handleSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const btn = document.getElementById('search-btn');
    btn.disabled = true; 
    btn.textContent = '...';
    document.getElementById('results').innerHTML = `<div class="loader"><div class="spin"></div> Searching...</div>`;

    try {
      if (isUrl(q)) {
        await loadFromUrl(q);
      } else {
        await loadSearch(q);
      }
    } catch(e) {
      document.getElementById('results').innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
    }
    btn.disabled = false; 
    btn.textContent = 'Search';
  }

  async function loadSearch(q) {
    const endpoint = currentFormat === 'audio' ? '/downloader/youtubemp3' : '/downloader/youtubemp4';
    const res = await fetch(`${API_BASE}${endpoint}?q=${encodeURIComponent(q)}&limit=6`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Search failed');
    if (!data.length) { 
      document.getElementById('results').innerHTML = `<div class="error-box">No results found.</div>`; 
      return; 
    }
    renderResults(data, q);
  }

  async function loadFromUrl(url) {
    const type = currentFormat === 'audio' ? 'mp3' : 'mp4';
    const res = await fetch(`${API_BASE}/download/youtube?q=${encodeURIComponent(url)}&type=${type}`);
    const data = await res.json();
    if (!res.ok || !data.status) throw new Error(data.message || 'Failed to load URL');
    
    // Format the single result to match the search result structure
    const result = [{
      id: data.result.id,
      title: data.result.title,
      uploader: data.result.author,
      duration: data.result.duration,
      thumbnail: data.result.thumbnail,
      url: url,
      stream_url: data.result.stream_url,
      download_url: data.result.download_url,
    }];
    renderResults(result, url);
  }

  function renderResults(items, query) {
    const el = document.getElementById('results');
    el.innerHTML = `<div class="results-title">${items.length} result${items.length !== 1 ? 's' : ''} for "${escapeHtml(query)}"</div>`;
    
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'track-card';
      card.style.animationDelay = `${i * 0.06}s`;
      card.id = `card-${i}`;

      const ext = currentFormat === 'audio' ? 'mp3' : 'mp4';
      
      card.innerHTML = `
        <div class="track-top">
          <div class="track-thumb-wrap">
            ${item.thumbnail
              ? `<img class="track-thumb" src="${item.thumbnail}" alt="" onerror="this.parentElement.innerHTML='<div class=thumb-ph>🎵</div>'">`
              : `<div class="thumb-ph">🎵</div>`}
            ${currentFormat === 'audio' ? `
            <div class="play-overlay" onclick="togglePreview(${i}, '${escapeHtml(item.stream_url)}', '${escapeHtml(item.title)}')">
              <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>` : ''}
          </div>
          <div class="track-info">
            <div class="track-title">${escapeHtml(item.title)}</div>
            <div class="track-author">${escapeHtml(item.uploader || '')}</div>
            <div class="track-actions">
              ${currentFormat === 'audio' ? `
              <button class="act-btn preview" id="previewbtn-${i}" onclick="togglePreview(${i}, '${escapeHtml(item.stream_url)}', '${escapeHtml(item.title)}')">
                ▶ Preview
              </button>` : ''}
              <button class="act-btn ${currentFormat === 'audio' ? 'dl-audio' : 'dl-video'}" id="dlbtn-${i}" onclick="downloadTrack(${i}, '${escapeHtml(item.download_url)}', '${escapeHtml(item.title)}.${ext}')">
                ⬇ ${currentFormat === 'audio' ? 'MP3' : 'MP4'}
              </button>
              ${currentFormat === 'audio' ? `
              <button class="act-btn dl-video" onclick="downloadVideo(${i}, '${escapeHtml(item.url)}', '${escapeHtml(item.title)}')">
                ⬇ MP4
              </button>` : ''}
            </div>
          </div>
          <div class="duration-pill">${formatDur(item.duration)}</div>
        </div>
        <div class="player-bar" id="player-${i}">
          <div class="player-top">
            <span style="font-size:0.8rem">🎵</span>
            <span class="player-title" id="ptitle-${i}">${escapeHtml(item.title)}</span>
            <span class="player-time" id="ptime-${i}">0:00 / ${formatDur(item.duration)}</span>
          </div>
          <div class="player-controls">
            <button class="p-btn" id="ppause-${i}" onclick="toggleAudioPause(${i})">⏸</button>
            <div class="progress-wrap" id="progwrap-${i}" onclick="seekAudio(event, ${i})">
              <div class="progress-fill" id="prog-${i}"></div>
            </div>
            <button class="p-btn" onclick="stopPreview(${i})">✕</button>
          </div>
        </div>
      `;
      el.appendChild(card);
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  async function togglePreview(i, streamUrl, title) {
    if (activePreview === i) {
      if (audio.paused) { 
        audio.play(); 
        updatePlayBtn(i, false);
      } else { 
        audio.pause(); 
        updatePlayBtn(i, true);
      }
      return;
    }

    if (activePreview !== null) stopPreview(activePreview);
    activePreview = i;
    
    const btn = document.getElementById(`previewbtn-${i}`);
    const bar = document.getElementById(`player-${i}`);
    if (btn) { 
      btn.textContent = '⏳ Loading...'; 
      btn.classList.add('playing'); 
    }

    try {
      audio.src = streamUrl;
      audio.load();
      
      await new Promise((resolve, reject) => {
        audio.oncanplaythrough = resolve;
        audio.onerror = reject;
        setTimeout(() => reject(new Error('Timeout loading stream')), 15000);
      });
      
      await audio.play();
      bar.classList.add('visible');
      if (btn) btn.textContent = '⏸ Pause';

      audio.ontimeupdate = () => {
        const prog = document.getElementById(`prog-${i}`);
        const time = document.getElementById(`ptime-${i}`);
        if (prog && audio.duration) prog.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
        if (time && audio.duration) time.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
      };
      audio.onended = () => stopPreview(i);
      audio.onerror = () => stopPreview(i);
      
    } catch(e) {
      console.error('Preview error:', e);
      if (btn) { 
        btn.textContent = '❌ Failed'; 
        btn.classList.remove('playing');
        setTimeout(() => { 
          if (btn) btn.textContent = '▶ Preview'; 
        }, 2000);
      }
      activePreview = null;
    }
  }

  function toggleAudioPause(i) {
    if (audio.paused) { 
      audio.play(); 
      document.getElementById(`ppause-${i}`).textContent = '⏸';
    } else { 
      audio.pause(); 
      document.getElementById(`ppause-${i}`).textContent = '▶';
    }
  }

  function updatePlayBtn(i, paused) {
    const btn = document.getElementById(`previewbtn-${i}`);
    const pbtn = document.getElementById(`ppause-${i}`);
    if (btn) btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
    if (pbtn) pbtn.textContent = paused ? '▶' : '⏸';
  }

  function stopPreview(i) {
    audio.pause();
    audio.src = '';
    const btn = document.getElementById(`previewbtn-${i}`);
    const bar = document.getElementById(`player-${i}`);
    const prog = document.getElementById(`prog-${i}`);
    if (btn) { 
      btn.textContent = '▶ Preview'; 
      btn.classList.remove('playing'); 
    }
    if (bar) bar.classList.remove('visible');
    if (prog) prog.style.width = '0%';
    if (activePreview === i) activePreview = null;
  }

  function seekAudio(e, i) {
    const wrap = document.getElementById(`progwrap-${i}`);
    const rect = wrap.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (audio.duration) audio.currentTime = pct * audio.duration;
  }

  async function downloadTrack(i, downloadUrl, fileName) {
    const btn = document.getElementById(`dlbtn-${i}`);
    const originalText = btn.textContent;
    btn.textContent = '⏳ Downloading...';
    btn.classList.add('dl-loading');

    try {
      const response = await fetch(downloadUrl);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
      
      btn.textContent = '✅ Done!';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove('dl-loading');
      }, 3000);
    } catch(e) {
      console.error('Download error:', e);
      btn.textContent = '❌ Failed';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove('dl-loading');
      }, 3000);
    }
  }

  async function downloadVideo(i, videoUrl, title) {
    const dlUrl = `${API_BASE}/api/download?url=${encodeURIComponent(videoUrl)}&format=video`;
    await downloadTrack(i, dlUrl, `${title}.mp4`);
  }

  // Enter key handler
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSearch();
  });

  // Test connection on load
  async function testConnection() {
    try {
      const res = await fetch(`${API_BASE}/api/health`);
      if (res.ok) {
        console.log('✅ Connected to backend');
      } else {
        console.warn('⚠️ Backend not responding properly');
      }
    } catch(e) {
      console.error('❌ Cannot connect to backend. Make sure server is running on port 3000');
      document.getElementById('results').innerHTML = `
        <div class="error-box">
          ⚠️ Cannot connect to backend server. Make sure to:<br>
          1. Run: node server.js<br>
          2. Access via http://localhost:3000 instead of opening file directly
        </div>
      `;
    }
  }
  
  testConnection();
</script>
</body>
</html>
